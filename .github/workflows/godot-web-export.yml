name: Export Web (Godot)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GODOT_VERSION: "4.5"
  GODOT_RELEASE: "stable"
  EXPORT_PRESET: "Web"
  EXPORT_PATH: "build/web/index.html"
  DEPLOY_BRANCH: "cf-pages"

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot and templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_TAG="${GODOT_VERSION}-${GODOT_RELEASE}"
          GODOT_ZIP="Godot_v${GODOT_TAG}_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_TAG}_export_templates.tpz"

          curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/${GODOT_ZIP}"
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/${TEMPLATES_TPZ}"

          unzip -q godot.zip -d .godot_bin
          GODOT_BIN="$(find .godot_bin -maxdepth 1 -type f \( -name 'Godot_v*linux.x86_64' -o -name 'Godot_v*linux.x86_64.*' \) | head -n 1)"
          test -n "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          unzip -q templates.tpz -d .godot_templates_unpack
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "$TEMPLATES_DIR"
          cp -a .godot_templates_unpack/templates/. "$TEMPLATES_DIR/"

      - name: Import assets
        shell: bash
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . --import

      - name: Export
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/web
          "$GODOT_BIN" --headless --path . --export-release "$EXPORT_PRESET" "$EXPORT_PATH"

      - name: Add Cloudflare Pages headers
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" $'/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: require-corp\n\n/*.wasm\n  Content-Type: application/wasm\n' > build/web/_headers

      - name: Deploy build to branch
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_DIR="$(mktemp -d)"
          cp -a build/web/. "$DEPLOY_DIR/"
          touch "$DEPLOY_DIR/.nojekyll"

          cd "$DEPLOY_DIR"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$DEPLOY_BRANCH"
          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Deploy web build"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin "$DEPLOY_BRANCH"
