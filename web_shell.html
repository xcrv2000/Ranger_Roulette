<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title>$GODOT_PROJECT_NAME</title>
    $GODOT_HEAD_INCLUDE
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        touch-action: none;
      }

      body {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #container {
        aspect-ratio: 720 / 1280;
        height: 100vh;
        max-height: 100vh;
        height: 100dvh;
        max-height: 100dvh;
        max-width: 100vw;
        width: auto;
      }

      #canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="canvas"></canvas>
    </div>
    <script src="$GODOT_URL"></script>
    <script>
      const canvas = document.getElementById("canvas");
      const engine = new Engine($GODOT_CONFIG);
      engine.startGame({
        canvas,
        canvasResizePolicy: 0,
      });
    </script>
  </body>
</html>
